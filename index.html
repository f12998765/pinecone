<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="个性化导航主页 - 松果">
    <title>松果</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">
    <link rel="icon" href="assets/images/favicon.ico" sizes="any">
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>[x-cloak] { display: none !important; }</style>
</head>

<body x-data="app" x-cloak>
    <div class="container">
        <div class="services-container"
             @touchstart="handleContainerTouchStart"
              @touchend="handleContainerTouchEnd"
              @touchmove="handleContainerTouchEnd"
             @click="handleContainerClick"
             @contextmenu="handleContainerContextMenu">
            <template x-if="error">
                <div class="error-message">
                    <p>无法加载服务列表，请检查网络连接</p>
                    <button class="retry-btn" @click="loadServices">重试</button>
                </div>
            </template>
            <template x-if="!error && services.length === 0">
                <div class="empty-state">
                    <p>暂无书签数据</p>
                    <p class="empty-hint">在设置中切换到 Linkding 并获取书签，或检查网络连接</p>
                </div>
            </template>
            <template x-if="!error && services.length > 0 && activeServices.length === 0">
                <div class="empty-state">
                    <p>所有书签已被过滤</p>
                    <p class="empty-hint">在设置中管理已屏蔽的域名</p>
                </div>
            </template>
            <template x-for="category in activeServices">
                <div class="category-section" :key="category.category">
                    <h2 class="category-title" x-text="category.category"></h2>
                    <div class="grid">
                        <template x-for="service in category.services">
                             <a :key="service.name"
                                  :href="isValidURI(service.uri) ? service.uri : '#'"
                                  :target="openMode === 'self' ? '_self' : '_blank'"
                                  rel="noopener noreferrer"
                                  class="service-link"
                                  :data-text-position="textPosition"
                                  :class="'demo-effect-' + hoverEffect"
                                  :aria-label="'打开 ' + service.name"
                                  :data-uri="service.uri"
                                  @click="openMode === 'background' ? handleBackgroundClick($event, service.uri) : true">
                                 <img class="service-icon"
                                      :src="getServiceIcon(service.uri) || service.icon || '/assets/images/favicon.svg'"
                                     :alt="service.name"
                                     loading="lazy"
                                     @error="imgError">
                                <span class="service-name" x-show="showNames" x-text="service.name"></span>
                            </a>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Floating Actions -->
    <div class="floating-actions">
        <button class="action-btn source-btn" @click="toggleDataSource"
                :aria-label="dataSource === 'local' ? '切换到 Linkding' : '切换到本地'">
            <span x-text="dataSource === 'local' ? '🌍' : '🔖'"></span>
        </button>
        <button class="action-btn settings-btn" @click="settingsOpen = true" aria-label="打开设置">
            <svg xmlns="http://www.w3.org/2000/svg" class="settings-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>
    </div>

    <!-- Context Menu -->
    <div x-show="contextMenu.show"
         class="context-menu-overlay"
         @click.self="hideContextMenu"
         @contextmenu.self.prevent="hideContextMenu">
        <div :style="`left: ${contextMenu.x}px; top: ${contextMenu.y}px;`"
             class="context-menu">
            <button class="context-menu-item" @click="filterUrlFromMenu">
                <span>🚫</span>
                <span>删除此网站</span>
            </button>
            <button class="context-menu-item" @click="customIconFromMenu">
                <span>🎨</span>
                <span>自定义图标</span>
            </button>
        </div>
    </div>

    <!-- Custom Icon Modal -->
    <div x-show="customIconModal.show" class="modal-overlay" @click.self="cancelCustomIcon" @contextmenu.self.prevent="cancelCustomIcon" @keydown.escape.window="cancelCustomIcon">
        <div class="modal-card">
            <div class="modal-header">
                <span>自定义图标</span>
                <button class="modal-close" @click="cancelCustomIcon">✕</button>
            </div>
            <div class="modal-body">
                <label class="modal-label">书签地址</label>
                <div class="modal-uri" x-text="customIconModal.uri"></div>

                <label class="modal-label">图标 URL</label>
                <input type="url" class="select-input" x-model="customIconModal.url" placeholder="https://..." style="margin-bottom:12px">

                <label class="modal-label">可选图标</label>
                <div class="icon-picker-grid" x-show="customIconModal.iconOptions?.length">
                    <template x-for="(item, i) in customIconModal.iconOptions" :key="i">
                        <div class="icon-picker-item" :class="{ selected: customIconModal.url === item.url }" @click="customIconModal.url = item.url" :title="item.label">
                            <img :src="item.url" class="icon-picker-img" @error="event.target.src = '/assets/images/favicon.svg'">
                            <span class="icon-picker-domain" x-text="item.label"></span>
                        </div>
                    </template>
                </div>
                <div x-show="customIconModal.domain && !customIconModal.iconDone" class="icon-picker-loading">
                    <span x-show="customIconModal.iconProgress">正在获取 <span class="icon-progress-label" x-text="customIconModal.iconProgress"></span> ...</span>
                    <span x-show="!customIconModal.iconProgress">正在获取...</span>
                </div>
                <div x-show="customIconModal.domain && customIconModal.iconDone && !customIconModal.iconOptions?.length" class="icon-picker-loading done">未获取到图标</div>

                <label class="modal-label">或上传图片</label>
                <input type="file" accept="image/*" class="file-input" @change="handleCustomIconUpload" style="margin-bottom:4px">

                <template x-if="customIconModal.url && (customIconModal.url.startsWith('data:') || isValidURI(customIconModal.url))">
                    <div class="modal-preview">
                        <img :src="customIconModal.url" class="modal-preview-img">
                    </div>
                </template>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" @click="cancelCustomIcon">取消</button>
                <button class="btn btn-primary" @click="saveCustomIcon" :disabled="!customIconModal.url?.trim()">保存</button>
            </div>
        </div>
    </div>

    <!-- Tag Picker Modal -->
    <div x-show="tagModalOpen" class="modal-overlay" @click.self="tagModalOpen = false" @keydown.escape.window="tagModalOpen = false" x-transition.opacity.duration.200ms>
        <div class="modal-card tag-picker-card">
            <div class="modal-header">
                <span>选择标签</span>
                <div class="modal-header-actions">
                    <button class="modal-clear-btn" @click="linkdingSelectedTags = []" x-show="linkdingSelectedTags.length > 0">清除</button>
                    <button class="modal-close" @click="tagModalOpen = false">✕</button>
                </div>
            </div>
            <div class="modal-body">
            <div class="tag-pills-wrap">
                    <template x-for="tag in linkdingTags" :key="tag.id">
                        <div class="color-pill" @click="toggleTag(tag.name)"
                             :class="{ selected: linkdingSelectedTags.includes(tag.name) }"
                             :style="linkdingSelectedTags.includes(tag.name) ? { color: tagColor(tag.name), boxShadow: '0 0 16px 3px ' + tagColor(tag.name) + '30, inset 0 0 12px 2px ' + tagColor(tag.name) + '1a' } : {}">
                            <span class="tag-order-badge" x-show="linkdingSelectedTags.includes(tag.name)" x-text="tagOrder(tag.name)" :style="{ background: badgeColor(tagOrder(tag.name)), boxShadow: '0 0 10px 2px ' + badgeColor(tagOrder(tag.name)) + '50, inset 0 0 6px 1px rgba(255,255,255,0.25)' }"></span>
                            <span class="color-pill-name" x-text="tag.name"></span>
                            <span class="color-pill-count" x-text="tag.count"></span>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Overlay -->
    <div class="settings-overlay" x-show="settingsOpen"
         @click="settingsOpen = false"
         @keydown.escape.window="settingsOpen = false">
        <!-- Settings Sidebar -->
        <div class="settings-sidebar"
             x-show="settingsOpen"
             x-transition:enter="sidebar-enter"
             x-transition:enter-start="sidebar-enter-start"
             x-transition:enter-end="sidebar-enter-end"
             x-transition:leave="sidebar-leave"
             x-transition:leave-start="sidebar-leave-start"
             x-transition:leave-end="sidebar-leave-end"
             @click.stop
             role="dialog" aria-modal="true" aria-label="设置面板">
            <div class="sidebar-header">
                <h3>设置</h3>
                <button class="sidebar-close" @click="settingsOpen = false">✕</button>
            </div>
            <div class="sidebar-body">
            <h4 class="sidebar-section-title">数据来源</h4>
            <div class="effect-pills" style="margin-bottom:16px">
                <button class="effect-pill" :class="{ selected: dataSource === 'local' }" @click="dataSource = 'local'">本地</button>
                <button class="effect-pill" :class="{ selected: dataSource === 'linkding' }" @click="dataSource = 'linkding'">Linkding</button>
            </div>
            <template x-if="dataSource === 'linkding'">
                <div class="sidebar-section">
                        <form @submit.prevent>
                            <div class="setting-item">
                                <label class="setting-label">API 地址</label>
                                <input type="text" class="select-input" x-model="linkdingUrl" id="linkding-url" name="username" autocomplete="username" placeholder="https://linkding.example.com">
                             </div>
                             <div class="setting-item">
                                 <label class="setting-label">API 令牌</label>
                                 <input type="password" class="select-input" x-model="linkdingToken" id="linkding-token" name="password" autocomplete="current-password" placeholder="输入令牌">
                            </div>
                        </form>
                        <div class="toggle-container" style="border-bottom:none">
                            <label class="toggle-label">API 代理</label>
                            <label class="switch">
                                <input type="checkbox" x-model="linkdingProxyEnabled">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <template x-if="linkdingProxyEnabled">
                            <div class="setting-item">
                                <input type="url" class="select-input" x-model="linkdingProxy" placeholder="https://corsproxy.io/?url={url}">
                            </div>
                        </template>
                        <div class="ld-row">
                            <button class="ld-btn ld-btn-tag" @click="handleTagButton" :disabled="linkdingTagsLoading || !linkdingUrl || !linkdingToken">
                                选择标签
                                <span class="ld-badge" x-show="linkdingSelectedTags.length && !linkdingTagsLoading" x-text="linkdingSelectedTags.length"></span>
                            </button>
                            <button class="ld-btn ld-btn-sync" @click="syncLinkding" :disabled="linkdingLoading || !linkdingUrl || !linkdingToken">
                                <span x-show="!linkdingLoading">获取书签</span>
                                <span x-show="linkdingLoading">同步中</span>
                            </button>
                            <button class="ld-btn ld-btn-refresh" @click="refreshIcons" :disabled="!services.length">刷新图标</button>
                            <button class="ld-btn ld-btn-danger" @click="clearLinkdingData" :disabled="!services.length">清除数据</button>
                        </div>
                        <template x-if="iconRefreshStatus">
                            <div class="linkding-status status-success" x-text="iconRefreshStatus"></div>
                        </template>
                        <div x-show="linkdingError && !iconRefreshStatus" class="linkding-status" x-text="linkdingError" :class="{ 'status-success': linkdingError.includes('成功') }"></div>
                        <div class="setting-item" style="margin-top:8px">
                            <label class="setting-label">已屏蔽地址</label>
                            <textarea class="select-input textarea-input" x-model="filterUrlsText" rows="2" placeholder='["https://example.com/page"]'></textarea>
                            <button class="btn btn-primary w-full" style="margin-top:10px" @click="applyFilterUrls" x-show="filterUrlsText !== JSON.stringify(linkdingFilterUrls, null, 2)">应用</button>
                        </div>
                        <div class="setting-item" style="border-bottom:none">
                            <label class="setting-label">自定义图标</label>
                            <textarea class="select-input textarea-input" x-model="customIconsText" rows="2" placeholder='{"https://example.com/page": "https://..."}'></textarea>
                            <button class="btn btn-primary w-full" style="margin-top:10px" @click="applyCustomIcons" x-show="customIconsText !== JSON.stringify(linkdingCustomIcons, null, 2)">应用</button>
                        </div>
                        <div class="setting-item" style="border-bottom:none;margin-top:8px">
                            <label class="setting-label">自定义图标源</label>
                            <div class="setting-desc">每行一个 URL，用 {domain} 占位，仅在自定义图标时使用</div>
                            <textarea class="select-input textarea-input" x-model="iconSourcesText" rows="3" placeholder="https://icons.example.com/{domain}/icon.png"></textarea>
                            <button class="btn btn-primary w-full" style="margin-top:10px" @click="applyIconSources" x-show="iconSourcesText !== (linkdingIconSources || []).join('\n')">应用</button>
                        </div>
                    </div>
                </template>

            <h4 class="sidebar-section-title">悬浮效果</h4>
            <div class="effect-pills">
                <template x-for="(effect, i) in effects">
                    <button :key="i" class="effect-pill"
                            :class="{ selected: hoverEffect === i + 1 }"
                            @click="hoverEffect = i + 1">
                        <span x-text="effect.label"></span>
                    </button>
                </template>
            </div>

            <h4 class="sidebar-section-title">图标</h4>
            <div class="sidebar-section">
                <div class="slider-container">
                    <label>图标大小</label>
                    <input type="range" x-model.number="iconSize" min="48" max="120">
                    <span class="slider-value" x-text="iconSize + 'px'"></span>
                </div>
                <div class="slider-container">
                    <label>图标圆角</label>
                    <input type="range" x-model.number="iconRadius" min="0" max="24">
                    <span class="slider-value" x-text="iconRadius + 'px'"></span>
                </div>
                <div class="slider-container">
                    <label>不透明度</label>
                    <input type="range" x-model.number="iconOpacity" min="0" max="100">
                    <span class="slider-value" x-text="iconOpacity + '%'"></span>
                </div>
                <div class="slider-container">
                    <label>图标间距</label>
                    <input type="range" x-model.number="iconGap" min="8" max="48">
                    <span class="slider-value" x-text="iconGap + 'px'"></span>
                </div>
            </div>

            <h4 class="sidebar-section-title">文字</h4>
            <div class="sidebar-section">
                <div class="setting-item setting-row">
                    <label class="setting-label">文字显示</label>
                    <div class="custom-select" x-data="{ open: false }" @click.outside="open = false">
                        <button type="button" class="cs-trigger" :aria-expanded="open" @click="open = !open" @keydown.escape="open = false"
                            :style="{ color: showNames ? '#5856d6' : '#8e8e93' }">
                            <span x-text="showNames ? '显示' : '隐藏'"></span>
                            <svg class="cs-chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="cs-dropdown" x-show="open" x-cloak>
                            <button type="button" class="cs-option" :class="{ selected: showNames }" @click="showNames = true; open = false" style="color:#5856d6">
                                <span>显示</span>
                            </button>
                            <button type="button" class="cs-option" :class="{ selected: !showNames }" @click="showNames = false; open = false" style="color:#8e8e93">
                                <span>隐藏</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="setting-item setting-row">
                    <label class="setting-label">文字位置</label>
                    <div class="custom-select" x-data="{ open: false }" @click.outside="open = false">
                        <button type="button" class="cs-trigger" :aria-expanded="open" @click="open = !open" @keydown.escape="open = false"
                            :style="{ color: textPosition === 'row' ? '#5856d6' : '#30d158' }">
                            <span x-text="textPosition === 'row' ? '右侧' : '下方'"></span>
                            <svg class="cs-chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="cs-dropdown" x-show="open" x-cloak>
                            <button type="button" class="cs-option" :class="{ selected: textPosition === 'row' }" @click="textPosition = 'row'; open = false" style="color:#5856d6">
                                <span>右侧</span>
                            </button>
                            <button type="button" class="cs-option" :class="{ selected: textPosition === 'column' }" @click="textPosition = 'column'; open = false" style="color:#30d158">
                                <span>下方</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="setting-item setting-row">
                    <label class="setting-label">打开方式</label>
                    <div class="custom-select" x-data="{ open: false }" @click.outside="open = false">
                        <button type="button" class="cs-trigger" :aria-expanded="open" @click="open = !open" @keydown.escape="open = false"
                            :style="{ color: openMode === 'self' ? '#ff9f0a' : (openMode === 'background' ? '#30d158' : '#007aff') }">
                            <span x-text="openMode === 'self' ? '当前标签页' : (openMode === 'background' ? '后台新标签' : '新标签页')"></span>
                            <svg class="cs-chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <div class="cs-dropdown" x-show="open" x-cloak>
                            <button type="button" class="cs-option" :class="{ selected: openMode === 'newtab' }" @click="openMode = 'newtab'; open = false" style="color:#007aff">
                                <span>新标签页</span>
                            </button>
                            <button type="button" class="cs-option" :class="{ selected: openMode === 'background' }" @click="openMode = 'background'; open = false" style="color:#30d158">
                                <span>后台新标签</span>
                            </button>
                            <button type="button" class="cs-option" :class="{ selected: openMode === 'self' }" @click="openMode = 'self'; open = false" style="color:#ff9f0a">
                                <span>当前标签页</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="slider-container">
                    <label>图标文字大小</label>
                    <input type="range" x-model.number="textSize" min="12" max="24">
                    <span class="slider-value" x-text="textSize + 'px'"></span>
                </div>
                <div class="slider-container">
                    <label>设置文字大小</label>
                    <input type="range" x-model.number="settingsTextSize" min="12" max="18">
                    <span class="slider-value" x-text="settingsTextSize + 'px'"></span>
                </div>
                <div class="slider-container">
                    <label>文字间距</label>
                    <input type="range" x-model.number="textIconGap" min="4" max="24">
                    <span class="slider-value" x-text="textIconGap + 'px'"></span>
                </div>
                <div class="setting-item setting-row">
                    <label class="setting-label">文字颜色</label>
                    <div class="native-color-row">
                        <input type="color" class="native-color-picker" x-model="textColor">
                        <span class="color-hex-label" x-text="textColor"></span>
                    </div>
                </div>
            </div>

            <h4 class="sidebar-section-title">布局</h4>
            <div class="sidebar-section">
                <div class="slider-container">
                    <label>最大宽度</label>
                    <input type="range" x-model.number="maxWidth" min="800" max="1920">
                    <span class="slider-value" x-text="maxWidth + 'px'"></span>
                </div>
                <div class="slider-container">
                    <label>每行图标数</label>
                    <input type="range" x-model.number="gridColumns" min="1" max="12">
                    <span class="slider-value" x-text="gridColumns"></span>
                </div>
            </div>

            <h4 class="sidebar-section-title">背景</h4>
            <div class="sidebar-section">
                <div class="setting-item">
                    <input type="file" accept="image/*" class="file-input" @change="handleBgUpload" x-ref="bgFileInput">
                </div>
                <div class="bg-preview-wrap" x-show="bgDataUrl">
                    <img :src="bgDataUrl" class="bg-preview-img">
                    <button class="bg-preview-x" @click="resetBg">✕</button>
                </div>
            </div>

            <button class="section-reset" @click="resetAll">重置所有设置</button>
        </div>
    </div>
</div>

    <script defer src="assets/js/icon-fetcher.js"></script>
    <script defer src="assets/js/linkding-fetcher.js"></script>
    <script defer src="assets/js/db.js"></script>
    <script defer src="assets/js/persist.js"></script>
    <script defer src="assets/js/app.js"></script>
    <script defer src="assets/vendor/alpinejs.3.15.12.min.js"></script>
    <script defer src="assets/vendor/alpinejs-focus.3.15.12.min.js"></script>
</body>

</html>
